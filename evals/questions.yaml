# Eval question set for the OmniPro 220 agent.
#
# Fields:
#   id                      kebab-case slug
#   question                the user message (plain text)
#   image                   optional path to a file; sent as an image block
#   context                 freeform description of what we're testing
#   expected_modality       "artifact" | "prose" | "clarification"
#   expected_artifact_type  (when modality is artifact) allowlisted template
#   expected_tools          list of tool names we expect the agent to call
#   must_cite_pages         page numbers the answer should reference (in text
#                           or via surfaced figures/chunks)
#   must_mention            substrings the answer should contain (case-insensitive)
#   must_not_mention        substrings the answer should NOT contain
#   category                tag for grouping in the report

# =====================================================
# README EXAMPLE QUESTIONS
# =====================================================

- id: duty-cycle-mig-200a-240v
  question: "What's the duty cycle for MIG welding at 200A on 240V?"
  category: readme-example
  context: Must render the duty-cycle matrix with the MIG/240V/200A cell highlighted.
  expected_modality: artifact
  expected_artifact_type: duty_cycle_matrix
  must_cite_pages: [7, 19]
  must_mention: ["25%", "2.5", "200A"]

- id: porosity-flux-cored
  question: "I'm getting porosity in my flux-cored welds. What should I check?"
  category: readme-example
  context: Should render a troubleshooting tree AND flag that shielding-gas items in the manual's MIG-centric list don't apply to flux-cored.
  expected_modality: artifact
  expected_artifact_type: troubleshooting_tree
  expected_tools: [render_artifact]
  must_cite_pages: [13, 37]
  must_mention: ["DCEN", "polarity", "CTWD"]

- id: tig-polarity-ground-socket
  question: "What polarity setup do I need for TIG welding? Which socket does the ground clamp go in?"
  category: readme-example
  context: Polarity diagram for TIG, ground → positive.
  expected_modality: artifact
  expected_artifact_type: polarity_diagram
  must_cite_pages: [24]
  must_mention: ["positive", "DCEN", "torch"]

# =====================================================
# TAXONOMY CATEGORIES
# =====================================================

- id: spec-lookup-tig-max-120v
  question: "What's the maximum welding current on TIG at 120V input?"
  category: spec-lookup
  # No expected_artifact_type — prose citing the number is equally correct.
  must_cite_pages: [7, 29]
  must_mention: ["125"]

- id: stick-polarity-ground
  question: "For stick welding, which socket does the ground clamp plug into?"
  category: polarity
  expected_modality: artifact
  expected_artifact_type: polarity_diagram
  must_cite_pages: [27]
  must_mention: ["negative", "DCEP"]

- id: settings-mild-steel-1-8
  question: "What settings should I use for 1/8 inch mild steel MIG?"
  category: settings
  expected_modality: artifact
  expected_artifact_type: settings_configurator
  must_mention: ["voltage", "wire"]

- id: bird-nest-mig
  question: "My wire keeps bird-nesting at the feed rollers on MIG. How do I fix it?"
  category: troubleshooting
  expected_modality: artifact
  expected_artifact_type: troubleshooting_tree
  must_cite_pages: [42]
  must_mention: ["feed tension", "contact tip"]

- id: load-10lb-spool
  question: "How do I load a 10-lb wire spool?"
  category: procedural
  expected_modality: artifact
  expected_artifact_type: procedural_walkthrough
  must_cite_pages: [11]
  must_mention: ["adapter"]  # "clockwise" lives in the artifact's step text

- id: find-feed-tensioner
  question: "Where is the feed tensioner on this welder?"
  category: component-id
  expected_modality: artifact
  expected_artifact_type: component_highlight
  must_cite_pages: [9]
  must_mention: ["feed tensioner"]

- id: aluminum-3-8
  question: "Can I weld 3/8 inch aluminum with this machine?"
  category: compatibility
  # Prose or artifact both acceptable — question has a nuanced "no" answer.
  must_mention: ["spool gun", "aluminum"]

- id: extension-cord
  question: "Can I use an extension cord with this welder?"
  category: safety
  expected_modality: prose
  must_cite_pages: [6]
  must_mention: ["no", "extension"]

- id: duty-cycle-exceeded-warning
  question: "The LCD is showing 'Duty Cycle Exceeded'. What does that mean and what do I do?"
  category: warning-screen
  # Artifact (duty cycle matrix) supplementing prose is fine here.
  must_cite_pages: [19, 23]
  must_mention: ["thermal", "cool", "fan"]

- id: ambiguous-settings
  question: "What settings should I use?"
  category: clarify-needed
  context: No process/material/thickness given; agent should clarify rather than guess.
  expected_modality: clarification
  expected_tools: [ask_clarification]

# =====================================================
# HARD CROSS-REFERENCE
# =====================================================

- id: continuous-mig-240v
  question: "I want to run MIG continuously (100% duty cycle) on 240V input. What's the maximum amperage and what does that imply for material thickness?"
  category: cross-reference
  expected_modality: artifact
  expected_artifact_type: duty_cycle_matrix
  must_cite_pages: [7, 19]
  must_mention: ["115", "continuous"]

- id: switch-mig-to-flux
  question: "I've been running solid-core MIG. I want to switch to flux-cored. What ALL has to change - cables, feed rollers, gas, wire?"
  category: cross-reference
  expected_modality: artifact
  expected_artifact_type: polarity_diagram
  must_cite_pages: [12, 13]
  must_mention: ["knurled", "DCEN", "swap"]

- id: flux-0045-setup
  question: "I'm using 0.045 flux-cored wire. What feed roller side do I need, and what polarity should I set?"
  category: cross-reference
  must_cite_pages: [12, 13]
  must_mention: ["knurled", "DCEN", "0.045"]

- id: 1-2-ga-steel-mig-flux
  question: "I have a 22-gauge piece of mild steel. Is MIG or flux-cored better, and why?"
  category: cross-reference
  must_mention: ["MIG", "thin", "burn"]

# =====================================================
# VISION DIAGNOSIS
# =====================================================

- id: vision-porosity-photo
  question: "Diagnose this weld — the bead is covered in small round pits scattered across the surface."
  image: knowledge/pages/owner_manual/p037.png
  category: vision-diagnosis
  context: p37 contains the labeled porosity reference among others. Agent should pick wire_porosity.
  expected_modality: artifact
  expected_artifact_type: weld_comparison
  must_cite_pages: [37]
  must_mention: ["porosity"]

- id: vision-stick-weld-current
  question: "Stick weld — the bead looks concave and sunken with jagged edges. What's causing it?"
  image: knowledge/pages/owner_manual/p038.png
  category: vision-diagnosis
  context: p38 has the labeled stick weld diagrams including current-too-high.
  expected_modality: artifact
  expected_artifact_type: weld_comparison

- id: vision-no-photo-is-good
  question: "Is my weld good?"
  category: clarify-needed
  context: No photo attached. Agent should ask for one (prose request or clarification chip both acceptable).
  must_mention: ["photo"]

